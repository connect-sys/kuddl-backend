# Cloudflare Workers Configuration for Kuddl Platform
# Development Environment (default)
name = "kuddl-backend-dev"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Custom domain for development API
[[routes]]
pattern = "api-dev.kuddl.co/*"
zone_name = "kuddl.co"

# Development server configuration
[dev]
port = 8787

# Environment Variables - Development
[vars]
ENVIRONMENT = "development"
R2_PUBLIC_URL = "https://dev-assets.kuddl.co"

# Database Configuration (D1) - Development
[[d1_databases]]
binding = "DB"
database_name = "kuddl-dev"
database_id = "710b0b90-1803-490e-990a-97c1893edd67"

# Production Environment
[env.production]
name = "kuddl-backend-prod"

# Custom domain for production API
[[env.production.routes]]
pattern = "api.kuddl.co/*"
zone_name = "kuddl.co"

[env.production.vars]
ENVIRONMENT = "production"
R2_PUBLIC_URL = "https://prodassets.kuddl.co"

[[env.production.d1_databases]]
binding = "DB"
database_name = "kuddl-prod"
database_id = "27348837-2b95-4583-8c27-325bf0a1652c"
