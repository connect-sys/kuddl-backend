# Cloudflare Workers Configuration for Kuddl Platform
name = "kuddl-backend"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# account_id = "your-cloudflare-account-id"

# Development server configuration
[dev]
port = 8787

# Environment Variables
# Configure secrets in Cloudflare Pages Environment Variables settings
[vars]
ENVIRONMENT = "development"
R2_PUBLIC_URL = "https://dev-assets.kuddl.co"

# Database Configuration (D1) - Development
[[d1_databases]]
binding = "DB"
database_name = "kuddl-dev"
database_id = "710b0b90-1803-490e-990a-97c1893edd67"

# R2 Storage Configuration - Configure these in Cloudflare Dashboard
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "kuddl-storage"

# Production Environment
[env.production]
name = "kuddl-backend-prod"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "kuddl-prod"
database_id = "27348837-2b95-4583-8c27-325bf0a1652c"
