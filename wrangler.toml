# Cloudflare Workers Configuration for Kuddl Platform
#
# IMPORTANT — secret management
# ─────────────────────────────────────────────────────────────────────────────
# This file is committed to source control. NEVER add real secrets here.
# All sensitive values (JWT, Twilio, SendGrid, Razorpay, Sandbox, etc.)
# are stored in Cloudflare via `wrangler secret put <KEY> [--env production]`
# and bound to env.<KEY> at runtime — no code change is needed.
#
# To set / rotate a secret:
#   wrangler secret put JWT_SECRET                         # default (dev)
#   wrangler secret put JWT_SECRET --env production        # prod
#
# To list configured secrets:
#   wrangler secret list
#   wrangler secret list --env production
# ─────────────────────────────────────────────────────────────────────────────

name = "kuddl-backend-dev"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "6a9b1e7bdc83a9d8ec1b28d86ac09d0b"

# Development server configuration
[dev]
port = 8787

# Default (development) non-secret variables.
# Secrets (JWT_SECRET, TWILIO_*, RAZORPAY_*, SANDBOX_*, SENDGRID_*) are set via
# `wrangler secret put` and are NOT listed here.
[vars]
ENVIRONMENT = "development"
TWILIO_TEST_MODE = "true"
R2_PUBLIC_URL = "https://devassets.kuddl.co"
SENDGRID_FROM_EMAIL = "noreply@dev.kuddl.co"
SANDBOX_BASE_URL = "https://api.sandbox.co.in"
SANDBOX_API_TEST_MODE = "true"
FRONTEND_URL = "https://partner.kuddl.co"

# Default D1 Database Bindings (Development)
[[d1_databases]]
binding = "KUDDL_DB"
database_name = "kuddl-dev"
database_id = "710b0b90-1803-490e-990a-97c1893edd67"

# Default R2 Storage Bindings (Development)
[[r2_buckets]]
binding = "KUDDL_STORAGE"
bucket_name = "kuddl-storage-dev"

# ─── Development environment ───────────────────────────────────────────────
[env.development]
workers_dev = true

[env.development.vars]
ENVIRONMENT = "development"
TWILIO_TEST_MODE = "true"
R2_PUBLIC_URL = "https://devassets.kuddl.co"
SENDGRID_FROM_EMAIL = "noreply@dev.kuddl.co"
SANDBOX_BASE_URL = "https://api.sandbox.co.in"
SANDBOX_API_TEST_MODE = "true"
FRONTEND_URL = "https://dev.partner.kuddl.co"

[[env.development.d1_databases]]
binding = "KUDDL_DB"
database_name = "kuddl-dev"
database_id = "710b0b90-1803-490e-990a-97c1893edd67"

[[env.development.r2_buckets]]
binding = "KUDDL_STORAGE"
bucket_name = "kuddl-storage-dev"

# ─── Production environment ────────────────────────────────────────────────
[env.production]
name = "kuddl-backend-prod"
workers_dev = false

routes = [
  { pattern = "api.kuddl.co/*", zone_name = "kuddl.co" }
]

[env.production.vars]
ENVIRONMENT = "production"
TWILIO_TEST_MODE = "false"
R2_PUBLIC_URL = "https://prodassets.kuddl.co"
SENDGRID_FROM_EMAIL = "noreply@kuddl.co"
SANDBOX_BASE_URL = "https://api.sandbox.co.in"
SANDBOX_API_TEST_MODE = "false"
FRONTEND_URL = "https://partner.kuddl.co"

[[env.production.d1_databases]]
binding = "KUDDL_DB"
database_name = "kuddl-prod"
database_id = "27348837-2b95-4583-8c27-325bf0a1652c"

[[env.production.r2_buckets]]
binding = "KUDDL_STORAGE"
bucket_name = "kuddl-storage-prod"
